<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Podpoř Buzz Ball</title>
    <style>
        :root {
            --bg: #000000;
            --card-bg: #121212;
            --accent: #d881fa;
            --text-main: #ffffff;
            --text-dim: #888888;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 400px;
            background: var(--card-bg);
            border-radius: 40px;
            padding: 40px 20px;
            text-align: center;
            border: 1px solid #222;
            box-shadow: 0 20px 50px rgba(216, 129, 250, 0.1);
        }

        .buzz-image {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--accent);
            margin-bottom: 30px;
            box-shadow: 0 0 20px rgba(216, 129, 250, 0.3);
        }

        h1 {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 15px;
            letter-spacing: -0.5px;
        }

        p {
            color: var(--text-dim);
            font-size: 16px;
            line-height: 1.5;
            margin-bottom: 35px;
            padding: 0 20px;
        }

        .btn-donate {
            display: inline-block;
            background: var(--accent);
            color: #000000;
            text-decoration: none;
            font-weight: 700;
            font-size: 18px;
            padding: 18px 40px;
            border-radius: 20px;
            transition: transform 0.2s, filter 0.2s;
            box-shadow: 0 10px 20px rgba(216, 129, 250, 0.2);
        }

        .btn-donate:hover {
            transform: scale(1.03);
            filter: brightness(1.1);
        }

        .btn-donate:active {
            transform: scale(0.97);
        }
    </style>
</head>
<body>

<div class="container">
    <img src="https://ibb.co/9HWHdKNH" alt="Buzz Ball" class="buzz-image">

    <h1>Podpoř stream</h1>
    
    <p>Každý váš příspěvek plní nealko <strong>Buzz Ball</strong> přímo na obrazovce! Pomoz mi dosáhnout cíle a pořádně to oslavit.</p>

    <a href="https://paypal.me/Davisoppxx" target="_blank" class="btn-donate">
        PŘISPĚT PŘES PAYPAL
    </a>
</div>

</body>
</html>
