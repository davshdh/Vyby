<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Buzz Ball Widget</title>
    <style>
        body {
            background-color: transparent; /* Průhledné pro OBS */
            color: white;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            text-align: center;
            position: relative;
        }

        .title {
            font-size: 24px;
            font-weight: bold;
            color: #d881fa;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
            margin-bottom: 10px;
        }

        /* Skleněná koule */
        .ball {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            border: 4px solid rgba(255, 255, 255, 0.3);
            position: relative;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.05);
            box-shadow: inset 0 0 20px rgba(255,255,255,0.2), 0 0 15px rgba(216, 129, 250, 0.3);
        }

        /* Tekutina */
        .liquid {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: linear-gradient(180deg, #d881fa 0%, #8e44ad 100%);
            height: 2%; /* Start na 10 Kč */
            transition: height 1s ease-out;
            z-index: 1;
        }

        /* Bublinky */
        .bubbles {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 2;
        }

        .bubble {
            position: absolute;
            bottom: -10px;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            animation: rise 3s infinite ease-in;
        }

        @keyframes rise {
            0% { transform: translateY(0) scale(1); opacity: 0; }
            50% { opacity: 0.8; }
            100% { transform: translateY(-180px) scale(0.5); opacity: 0; }
        }

        .amount {
            position: absolute;
            width: 100%;
            top: 50%;
            transform: translateY(-50%);
            font-size: 20px;
            font-weight: bold;
            z-index: 3;
            text-shadow: 1px 1px 5px black;
        }

        .btn-test {
            margin-top: 20px;
            padding: 8px 15px;
            background: #d881fa;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="title">BUZZ BALL</div>
    <div class="ball">
        <div class="liquid" id="liquid"></div>
        <div class="bubbles" id="bubbles"></div>
        <div class="amount" id="counter">10 / 500 Kč</div>
    </div>
    <button class="btn-test" onclick="addMoney(50)">Test +50 Kč</button>
</div>

<script>
    let current = 10;
    const goal = 500;

    function addMoney(val) {
        current += val;
        if (current > goal) current = goal;
        
        const percent = (current / goal) * 100;
        document.getElementById('liquid').style.height = percent + '%';
        document.getElementById('counter').innerText = current + " / " + goal + " Kč";
        
        createBubble();
    }

    function createBubble() {
        const bubbles = document.getElementById('bubbles');
        for(let i=0; i<5; i++) {
            const b = document.createElement('div');
            b.className = 'bubble';
            const size = Math.random() * 10 + 5 + 'px';
            b.style.width = size;
            b.style.height = size;
            b.style.left = Math.random() * 100 + '%';
            b.style.animationDuration = (Math.random() * 2 + 1) + 's';
            bubbles.appendChild(b);
            setTimeout(() => b.remove(), 3000);
        }
    }

    // Inicializace
    addMoney(0);
</script>

</body>
</html>
